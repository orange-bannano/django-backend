<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Memo Office</title>
  <link rel="stylesheet" href="/static/frontend/css/app.css">
  <script src="/config.js"></script>
</head>
<body>
  <nav id="site-nav"></nav>

  <main>
    <header class="page-header">
      <h1>Log in</h1>
      <p>Authenticate with your email and password to access notes and account settings.</p>
    </header>

    <div id="login-alert" class="alert alert-error" hidden></div>

    <section class="panel" style="max-width: 420px;">
      <form id="login-form">
        <div class="form-grid" style="grid-template-columns: 1fr;">
          <label>
            Email
            <input type="email" name="email" required autocomplete="email">
          </label>
          <label>
            Password
            <input type="password" name="password" required autocomplete="current-password">
          </label>
        </div>
        <div style="margin-top: 1rem;">
          <button type="submit" class="btn btn-primary">Sign in</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="/static/frontend/js/login.js"></script>
</body>
</html>
